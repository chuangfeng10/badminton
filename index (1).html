<style>
  :root {
    --accent: #f5c518;
    --bg: #1a1a2e;
    --muted: #7a8ba0;
    --highlight: #e94560;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width:100%; height:100%; overflow:hidden; }
  body { font-family:'Noto Sans TC',sans-serif; background:var(--bg); color:#eaeaea; display:flex; align-items:center; justify-content:center; }

  .page { display:none; width:100%; max-width:480px; height:100vh; }
  .page.active { display:flex; flex-direction:column; }

  /* ===== SETTINGS ===== */
  #page-settings { background:linear-gradient(160deg,#1a1a2e 0%,#16213e 60%,#0f3460 100%); position:relative; overflow:hidden; }
  #page-settings::before { content:''; position:absolute; top:-80px; right:-80px; width:260px; height:260px; border-radius:50%; background:radial-gradient(circle,rgba(245,197,24,0.12) 0%,transparent 70%); pointer-events:none; }
  .settings-header { padding:48px 28px 20px; position:relative; }
  .settings-header h1 { font-family:'Oswald',sans-serif; font-size:2.2rem; letter-spacing:2px; color:var(--accent); line-height:1; }
  .settings-header p { color:var(--muted); font-size:0.85rem; margin-top:6px; letter-spacing:1px; }
  .shuttle-icon { position:absolute; right:28px; top:44px; font-size:2.8rem; transform:rotate(-30deg); filter:drop-shadow(0 0 12px rgba(245,197,24,0.5)); }
  .settings-body { flex:1; padding:8px 20px 24px; overflow-y:auto; }
  .setting-card { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:16px; padding:18px 20px; margin-bottom:14px; backdrop-filter:blur(4px); }
  .setting-label { font-size:0.78rem; letter-spacing:2px; color:var(--accent); font-weight:700; text-transform:uppercase; margin-bottom:14px; }
  .mode-buttons,.sets-buttons { display:flex; gap:8px; }
  .mode-btn,.sets-btn { flex:1; padding:10px 4px; border-radius:10px; border:2px solid rgba(255,255,255,0.1); background:transparent; color:var(--muted); cursor:pointer; transition:all 0.2s; font-family:'Noto Sans TC',sans-serif; font-size:0.95rem; font-weight:700; }
  .sets-btn { font-family:'Oswald',sans-serif; font-size:1.1rem; }
  .mode-btn.active { background:var(--accent); border-color:var(--accent); color:#1a1a2e; box-shadow:0 4px 16px rgba(245,197,24,0.35); }
  .sets-btn.active { background:var(--highlight); border-color:var(--highlight); color:#fff; box-shadow:0 4px 16px rgba(233,69,96,0.35); }
  .mode-btn:hover:not(.active) { border-color:var(--accent); color:var(--accent); }
  .sets-btn:hover:not(.active) { border-color:var(--highlight); color:var(--highlight); }
  .slider-row { display:flex; align-items:center; gap:12px; }
  .slider-row input[type=range] { flex:1; -webkit-appearance:none; height:6px; border-radius:3px; background:rgba(255,255,255,0.1); outline:none; }
  .slider-row input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:22px; height:22px; border-radius:50%; background:var(--accent); cursor:pointer; box-shadow:0 0 8px rgba(245,197,24,0.5); border:3px solid #1a1a2e; }
  .slider-val { font-family:'Oswald',sans-serif; font-size:1.4rem; color:var(--accent); min-width:36px; text-align:right; }
  .slider-labels { display:flex; justify-content:space-between; margin-top:6px; font-size:0.72rem; color:var(--muted); }
  .start-btn { width:calc(100% - 40px); margin:4px 20px 140px; padding:18px; border-radius:16px; border:none; background:linear-gradient(135deg,var(--accent) 0%,#e5a800 100%); color:#1a1a2e; font-family:'Oswald',sans-serif; font-size:1.4rem; letter-spacing:3px; cursor:pointer; font-weight:700; box-shadow:0 8px 24px rgba(245,197,24,0.4); transition:transform 0.15s,box-shadow 0.15s; position:relative; overflow:hidden; }
  .start-btn::after { content:''; position:absolute; inset:0; background:linear-gradient(135deg,rgba(255,255,255,0.2) 0%,transparent 60%); pointer-events:none; }
  .start-btn:hover { transform:translateY(-2px); box-shadow:0 12px 32px rgba(245,197,24,0.5); }
  .start-btn:active { transform:translateY(0); }

  /* Zone grid — 2 cols × 3 rows, no visible numbers */
  .zones { position:absolute; inset:0; display:grid; grid-template-columns:1fr 1fr; grid-template-rows:1fr 1fr 1fr; }
  .zone { position:relative; display:flex; align-items:center; justify-content:center; }

  /* Shuttlecock image (bg-removed) */
  .shuttlecock {
    position:absolute;
    pointer-events:none;
    z-index:5;
    display:flex; align-items:center; justify-content:center;
    background: transparent;
  }
  .shuttle-img {
    display:block;
    width:100%; height:100%;
    object-fit:contain;
  }
   70%{transform:scale(1.1);} 100%{opacity:1;transform:scale(1);} }

  .zone-highlight { position:absolute; inset:0; animation:zoneFlash 0.55s ease-out forwards; pointer-events:none; z-index:2; }
  @keyframes zoneFlash { 0%{background:rgba(255,255,100,0.4);} 100%{background:transparent;} }

  /* Math overlay */
  .math-overlay { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; z-index:8; pointer-events:none; }
  .math-question { background:rgba(255,255,255,0.93); border-radius:22px; padding:24px 44px; text-align:center; box-shadow:0 10px 50px rgba(0,0,0,0.55); animation:mathPop 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards; white-space:nowrap; }
  @keyframes mathPop { 0%{transform:scale(0.35);opacity:0;} 100%{transform:scale(1);opacity:1;} }
  /* Reference digit size — used by JS to size shuttlecock */
  .math-expr { font-family:'Oswald',sans-serif; font-size:clamp(3.2rem,15vw,6rem); color:#111; font-weight:700; letter-spacing:6px; line-height:1; }
  #size-probe { position:fixed; visibility:hidden; font-family:'Oswald',sans-serif; font-size:clamp(3.2rem,15vw,6rem); font-weight:700; line-height:1; white-space:nowrap; pointer-events:none; }

  /* Countdown */
  .countdown-overlay { position:absolute; inset:0; background:rgba(0,0,0,0.78); display:flex; align-items:center; justify-content:center; z-index:30; }
  .countdown-num { font-family:'Oswald',sans-serif; font-size:clamp(6rem,26vw,11rem); color:#fff; font-weight:700; text-shadow:0 0 50px rgba(245,197,24,0.85); animation:countAnim 0.5s ease-out; line-height:1; }
  .countdown-num.go { color:var(--accent); text-shadow:0 0 80px rgba(245,197,24,1); font-size:clamp(4.5rem,20vw,9rem); }
  @keyframes countAnim { 0%{transform:scale(1.9);opacity:0;} 100%{transform:scale(1);opacity:1;} }

  /* Pause */
  .pause-overlay { position:absolute; inset:0; background:rgba(0,0,0,0.72); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:25; gap:14px; }
  .pause-text { font-family:'Oswald',sans-serif; font-size:clamp(3rem,14vw,5.5rem); color:#fff; font-weight:700; letter-spacing:5px; text-shadow:0 0 40px rgba(245,197,24,0.7); animation:pauseIn 0.3s ease-out; }
  .pause-sub { font-size:0.95rem; color:rgba(255,255,255,0.5); letter-spacing:2px; }
  @keyframes pauseIn { 0%{transform:scale(0.6);opacity:0;} 100%{transform:scale(1);opacity:1;} }

  /* Top HUD */
  .training-topbar { position:absolute; top:0; left:0; right:0; display:flex; align-items:center; justify-content:space-between; padding:12px 14px 8px; background:rgba(0,0,0,0.55); z-index:15; pointer-events:none; }
  .back-btn { pointer-events:all; background:none; border:none; color:var(--accent); font-size:0.9rem; font-family:'Noto Sans TC',sans-serif; cursor:pointer; padding:4px 8px; border-radius:8px; letter-spacing:1px; }
  .back-btn:hover { background:rgba(245,197,24,0.1); }
  .progress-info { font-family:'Oswald',sans-serif; font-size:1rem; color:var(--accent); letter-spacing:1px; }
  .mode-badge { font-size:0.75rem; padding:4px 10px; border-radius:20px; font-weight:700; letter-spacing:1px; }
  .mode-badge.beginner     { background:rgba(45,122,58,0.4);  color:#5dde76;      border:1px solid #5dde76; }
  .mode-badge.intermediate { background:rgba(245,197,24,0.25);color:var(--accent);border:1px solid var(--accent); }
  .mode-badge.advanced     { background:rgba(233,69,96,0.25); color:var(--highlight);border:1px solid var(--highlight); }

  /* ===== CELEBRATION ===== */
  #page-celebration { background:radial-gradient(ellipse at center,#1a2a0a 0%,#0a1a0a 100%); align-items:center; justify-content:center; text-align:center; padding:40px 24px; position:relative; overflow:hidden; }
  .confetti-container { position:absolute; inset:0; pointer-events:none; overflow:hidden; }
  .confetti-piece { position:absolute; border-radius:2px; animation:confettiFall linear forwards; }
  @keyframes confettiFall { 0%{transform:translateY(-20px) rotate(0deg);opacity:1;} 100%{transform:translateY(110vh) rotate(720deg);opacity:0;} }
  .trophy-icon { font-size:5rem; margin-bottom:16px; animation:trophyBounce 0.8s cubic-bezier(0.34,1.56,0.64,1); display:block; }
  @keyframes trophyBounce { 0%{transform:scale(0) rotate(-20deg);opacity:0;} 100%{transform:scale(1) rotate(0deg);opacity:1;} }
  .celebration-title { font-family:'Oswald',sans-serif; font-size:2.4rem; color:var(--accent); letter-spacing:3px; margin-bottom:8px; text-shadow:0 0 30px rgba(245,197,24,0.6); }
  .celebration-sub   { color:var(--muted); font-size:0.9rem; margin-bottom:28px; line-height:1.7; white-space:pre-line; }
  .stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:28px; width:100%; max-width:300px; }
  .stat-card  { background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:14px; padding:14px 10px; }
  .stat-val   { font-family:'Oswald',sans-serif; font-size:1.8rem; color:var(--accent); }
  .stat-lbl   { font-size:0.72rem; color:var(--muted); letter-spacing:1px; margin-top:4px; }
  .return-bar { width:100%; max-width:240px; height:6px; background:rgba(255,255,255,0.1); border-radius:3px; overflow:hidden; margin-top:8px; }
  .return-fill{ height:100%; background:var(--accent); border-radius:3px; width:100%; animation:returnTimer 5s linear forwards; }
  @keyframes returnTimer { from{width:100%;} to{width:0%;} }
  .return-label { font-size:0.75rem; color:var(--muted); margin-top:8px; }
  .hidden { display:none !important; }
</style>
</head>
<body>

<!-- ===== PAGE 1: SETTINGS ===== -->
<div id="page-settings" class="page active">
  <div class="settings-header">
    <h1>羽球步法<br>訓練系統</h1>
    <p>BADMINTON FOOTWORK TRAINER</p>
    <span class="shuttle-icon">🏸</span>
  </div>
  <div class="settings-body">
    <div class="setting-card">
      <div class="setting-label">模式</div>
      <div class="mode-buttons">
        <button class="mode-btn active" onclick="selectMode('beginner',this)">初級</button>
        <button class="mode-btn"        onclick="selectMode('intermediate',this)">中級</button>
        <button class="mode-btn"        onclick="selectMode('advanced',this)">高級</button>
      </div>
      <div id="mode-desc" style="margin-top:10px;font-size:0.78rem;color:var(--muted);line-height:1.6;">場地六個位置隨機出現羽球，跑到對應位置！</div>
    </div>
    <div class="setting-card">
      <div class="setting-label">間隔（秒）</div>
      <div class="slider-row">
        <input type="range" id="interval-slider" min="1" max="10" value="3" step="1"
          oninput="document.getElementById('interval-val').textContent=this.value">
        <div class="slider-val" id="interval-val">3</div>
      </div>
      <div class="slider-labels"><span>1秒</span><span>10秒</span></div>
    </div>
    <div class="setting-card">
      <div class="setting-label">組數（次）</div>
      <div class="sets-buttons">
        <button class="sets-btn active" onclick="selectSets(10,this)">10</button>
        <button class="sets-btn"        onclick="selectSets(20,this)">20</button>
        <button class="sets-btn"        onclick="selectSets(30,this)">30</button>
        <button class="sets-btn"        onclick="selectSets(40,this)">40</button>
        <button class="sets-btn"        onclick="selectSets(50,this)">50</button>
      </div>
    </div>
  </div>
  <button class="start-btn" onclick="startTraining()">開 始 訓 練</button>
</div>

<!-- probe element to measure digit height -->
<div id="size-probe">8</div>

<!-- ===== PAGE 2: TRAINING ===== -->
<div id="page-training" class="page">
  <div class="court" id="court">
    <!-- NO SVG lines or zone numbers — court image handles visuals -->
    <div class="zones" id="zones">
      <div class="zone" id="zone-1"></div>
      <div class="zone" id="zone-2"></div>
      <div class="zone" id="zone-3"></div>
      <div class="zone" id="zone-4"></div>
      <div class="zone" id="zone-5"></div>
      <div class="zone" id="zone-6"></div>
    </div>

    <!-- Shuttlecock (real photo, bg removed) -->

  advanced:    '場地中央出現四則運算算式（答案1~6），算出並跑到對應位置！'
};
const modeBadgeClass = {beginner:'beginner',intermediate:'intermediate',advanced:'advanced'};
const modeName = {beginner:'初級',intermediate:'中級',advanced:'高級'};

function selectMode(mode,btn){

function goBack(){ stopTraining(); showPage('settings'); }

// ===== SHUTTLE SIZE = math digit "8" height =====
function getShuttleSize(){
  const probe = document.getElementById('size-probe');
  const h = probe.getBoundingClientRect().height;
  // height of a single digit; use that as the shuttle size
  return Math.max(52, Math.round(h * 1.3));
}

// Zone positions as % of court div (2-col × 3-row grid)
// zones: 1=top-left, 2=top-right, 3=mid-left, 4=mid-right, 5=bot-left, 6=bot-right
const zonePos = {
  1:{cx:20,cy:20}, 2:{cx:80,cy:20},
  3:{cx:20,cy:50}, 4:{cx:80,cy:50},
  5:{cx:20,cy:80}, 6:{cx:80,cy:80}
};

// Zone label names
const zoneLabels = {
  1:'左上', 2:'右上',
  3:'左邊', 4:'右邊',
  5:'左下', 6:'右下'
};

const farPairs       = [[1,6],[6,1],[5,2],[2,5]];
const farAnswerPairs = [[1,6],[6,1],[2,5],[5,2]];
function isFarPair(a,b){return farPairs.some(p=>p[0]===a&&p[1]===b);}
function isFarAnswerPair(a,b){return farAnswerPairs.some(p=>p[0]===a&&p[1]===b);}

function generateMath(mode){
  const ops=mode==='advanced'?['+','-','×','÷']:['+','-'];
  let tries=0,expr,answer;
  do{
    const op=ops[Math.floor(Math.random()*ops.length)];
    answer=Math.floor(Math.random()*6)+1;
    let a,b;
    if(op==='+'){b=Math.floor(Math.random()*(answer-1))+1;a=answer-b;if(a<1){tries++;continue;}expr=`${a} + ${b} =`;}
    else if(op==='-'){b=Math.floor(Math.random()*5)+1;a=answer+b;if(a>9){tries++;continue;}expr=`${a} − ${b} =`;}
    else if(op==='×'){const facs=[];for(let i=1;i<=9;i++)for(let j=1;j<=9;j++)if(i*j===answer)facs.push([i,j]);if(!facs.length){tries++;continue;}const[fa,fb]=facs[Math.floor(Math.random()*facs.length)];expr=`${fa} × ${fb} =`;}
    else{const divs=[];for(let b2=1;b2<=9;b2++)if(answer*b2<=54)divs.push(b2);if(!divs.length){tries++;continue;}b=divs[Math.floor(Math.random()*divs.length)];a=answer*b;expr=`${a} ÷ ${b} =`;}
    return{expr,answer};
  }while(tries<30);
  return{expr:`${answer-1} + 1 =`,answer};
}

// Shuttle rotation: head (cork) always DOWN — feathers up
function getShuttleRotation(zone){ return 0; }

function startTimerFill(durationMs){
  state.timerStartTs=performance.now(); state.currentDuration=durationMs;
}
function pauseTimerFill(){
  const elapsed=performance.now()-state.timerStartTs;
  return Math.max(0,state.currentDuration-elapsed);
}
function resumeTimerFill(rem){
  state.timerStartTs=performance.now()-(state.currentDuration-rem);
}

function showNext(){
  if(!state.running)return;
  if(state.current>=state.total){endTraining();return;}
  state.current++;
  document.getElementById('progress-info').textContent=`${state.current} / ${state.total}`;
  let duration=state.interval*1000;

  if(state.mode==='beginner'){
    // 使用預先算好的 zone（若有），否則隨機產生
    const zone = (state.nextZone!==null) ? state.nextZone : (Math.floor(Math.random()*6)+1);

    // 預先算出「下一個」zone（避免與本次相同）
    let nextZone;
    do{ nextZone=Math.floor(Math.random()*6)+1; }while(nextZone===zone);
    state.nextZone=nextZone;

    // 判斷「本次 zone → 下次 nextZone」是否最長斜線，決定本次持續時間
    if(isFarPair(zone,nextZone))duration+=1000;

    state.prevZone=zone;

    const pos=zonePos[zone];
    const court=document.getElementById('court');
    const shuttle=document.getElementById('shuttlecock');
    const img=document.getElementById('shuttle-img');
    const W=court.offsetWidth, H=court.offsetHeight;
    const sz=getShuttleSize();

    // position
    shuttle.style.left=(pos.cx/100*W - sz/2)+'px';
    shuttle.style.top =(pos.cy/100*H - sz/2)+'px';
    shuttle.style.width=sz+'px';
    shuttle.style.height=sz+'px';

    img.style.width=sz+'px';
    img.style.height=sz+'px';
    img.style.objectFit='contain';

    const rot=getShuttleRotation(zone);
    img.style.transform=`rotate(${rot}deg)`;

    // reset animation
    shuttle.classList.remove('hidden');
    shuttle.style.animation='none';
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      shuttle.style.animation='none';
    }));

    // flash zone
    const zEl=document.getElementById('zone-'+zone);
    const fl=document.createElement('div'); fl.className='zone-highlight'; zEl.appendChild(fl);
    setTimeout(()=>fl.remove(),550);

    document.getElementById('math-overlay').classList.add('hidden');
    playSmash();
  } else {
    const{expr,answer}=generateMath(state.mode);
    if(state.prevAnswer!==null&&isFarAnswerPair(state.prevAnswer,answer))duration+=1000;
    state.prevAnswer=answer;
    document.getElementById('math-expr').textContent=expr;
    const mo=document.getElementById('math-overlay');
    mo.classList.remove('hidden');
    const mq=mo.querySelector('.math-question');
    mq.style.animation='none';
    requestAnimationFrame(()=>requestAnimationFrame(()=>{mq.style.animation='mathPop 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards';}));
    document.getElementById('shuttlecock').classList.add('hidden');
    playSmash();
  }
  startTimerFill(duration);
  state.timer=setTimeout(showNext,duration);
}

function runCountdown(steps,cb){
  const ov=document.getElementById('countdown-overlay');
  const numEl=document.getElementById('countdown-num');
  ov.classList.remove('hidden');
  state.inCountdown=true;
  let i=0;
  function tick(){
    if(i>=steps.length){ov.classList.add('hidden');state.inCountdown=false;cb();return;}
    numEl.textContent=steps[i];
    numEl.className='countdown-num'+(steps[i]==='GO!'?' go':'');
    numEl.style.animation='none';
    requestAnimationFrame(()=>requestAnimationFrame(()=>{numEl.style.animation='countAnim 0.5s ease-out';}));
    if(steps[i]==='GO!') playWhistle();
    i++; setTimeout(tick,800);
  }
  tick();
}

let pausedRemaining=0;
function togglePause(){
  if(state.inCountdown)return;
  if(!state.paused){
    state.paused=true; state.running=false;
    if(state.timer){clearTimeout(state.timer);state.timer=null;}
    pausedRemaining=pauseTimerFill();
    document.getElementById('pause-overlay').classList.remove('hidden');
  } else {
    state.paused=false;
    document.getElementById('pause-overlay').classList.add('hidden');
    runCountdown(['3','2','1'],()=>{
      state.running=true;
      resumeTimerFill(pausedRemaining);
      state.timer=setTimeout(showNext,pausedRemaining);
    });
  }
}

document.getElementById('court').addEventListener('click',()=>{
  if(!state.running&&!state.paused)return;
  togglePause();
});

function startTraining(){
  state.interval=parseInt(document.getElementById('interval-slider').value);
  state.current=0; state.total=state.sets;
  state.prevZone=null; state.prevAnswer=null; state.nextZone=null;
  state.running=false; state.paused=false; state.inCountdown=false;

  const badge=document.getElementById('mode-badge');
  badge.textContent=modeName[state.mode]; badge.className='mode-badge '+modeBadgeClass[state.mode];
  document.getElementById('progress-info').textContent=`0 / ${state.total}`;
  document.getElementById('shuttlecock').classList.add('hidden');
  document.getElementById('math-overlay').classList.add('hidden');
  document.getElementById('pause-overlay').classList.add('hidden');
  document.getElementById('countdown-overlay').classList.add('hidden');


  showPage('training');
  runCountdown(['3','2','1','GO!'],()=>{state.running=true;showNext();});
}

function stopTraining(){
  state.running=false; state.paused=false; state.inCountdown=false;
  if(state.timer){clearTimeout(state.timer);state.timer=null;}
}

function endTraining(){
  state.running=false;
  document.getElementById('stat-total').textContent=state.total;
  document.getElementById('stat-mode').textContent=modeName[state.mode];
  const titles={beginner:['做得好！','步法紮實！','繼續加油！'],intermediate:['數字達人！','算術加步法！','腦體兼備！'],advanced:['完美挑戰！','頂尖訓練！','無與倫比！']};
  const t=titles[state.mode];
  document.getElementById('celebration-title').textContent=t[Math.floor(Math.random()*t.length)];
  const subs={beginner:`完成 ${state.total} 次步法訓練\n繼續練習，步法更穩！`,intermediate:`完成 ${state.total} 題中級挑戰\n腦力體力一起訓練！`,advanced:`完成 ${state.total} 題高級挑戰\n你已達到頂尖水準！`};
  document.getElementById('celebration-sub').textContent=subs[state.mode];
  const icons={beginner:'🎉',intermediate:'🏅',advanced:'🏆'};
  document.getElementById('trophy-icon').textContent=icons[state.mode];

  const container=document.getElementById('confetti-container'); container.innerHTML='';
  const colors=['#f5c518','#e94560','#5dde76','#4da6ff','#ff8c42','#c77dff'];
  const count=state.mode==='beginner'?45:state.mode==='intermediate'?75:115;
  for(let i=0;i<count;i++){
    const c=document.createElement('div'); c.className='confetti-piece';
    c.style.left=Math.random()*100+'%'; c.style.background=colors[Math.floor(Math.random()*colors.length)];
    c.style.width=(6+Math.random()*10)+'px'; c.style.height=(6+Math.random()*10)+'px';
    c.style.borderRadius=Math.random()>0.5?'50%':'2px';
    c.style.animationDuration=(2+Math.random()*3)+'s'; c.style.animationDelay=(Math.random()*2)+'s';
    container.appendChild(c);
  }
  playEndSound(state.mode);
  const rf=document.getElementById('return-fill'); rf.style.animation='none';
  requestAnimationFrame(()=>{rf.style.animation='returnTimer 5s linear forwards';});
  showPage('celebration');
  setTimeout(()=>showPage('settings'),5000);
}

function playSmash(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const t=ctx.currentTime;

    // === 擊球瞬間：寬頻噪音 burst（拍面接觸羽球）===
    const bufLen=ctx.sampleRate*0.06;
    const buf=ctx.createBuffer(1,bufLen,ctx.sampleRate);
    const data=buf.getChannelData(0);
    for(let i=0;i<bufLen;i++) data[i]=(Math.random()*2-1);
    const noise=ctx.createBufferSource();
    noise.buffer=buf;

    // 高通濾波：只留高頻 click 感
    const hp=ctx.createBiquadFilter();
    hp.type='highpass'; hp.frequency.value=3200; hp.Q.value=0.8;

    // 低頻 thump：拍框震動
    const osc=ctx.createOscillator();
    osc.type='sine'; osc.frequency.value=160;
    osc.frequency.setValueAtTime(160,t);
    osc.frequency.exponentialRampToValueAtTime(60,t+0.07);

    // 中頻 body：羽球羽毛散開的悶聲
    const osc2=ctx.createOscillator();
    osc2.type='triangle'; osc2.frequency.value=520;
    osc2.frequency.exponentialRampToValueAtTime(200,t+0.05);

    const gNoise=ctx.createGain();
    gNoise.gain.setValueAtTime(1.0,t);
    gNoise.gain.exponentialRampToValueAtTime(0.001,t+0.055);

    const gOsc=ctx.createGain();
    gOsc.gain.setValueAtTime(1.2,t);
    gOsc.gain.exponentialRampToValueAtTime(0.001,t+0.09);

    const gOsc2=ctx.createGain();
    gOsc2.gain.setValueAtTime(0.6,t);
    gOsc2.gain.exponentialRampToValueAtTime(0.001,t+0.06);

    const master=ctx.createGain(); master.gain.value=2.2;
    const comp=ctx.createDynamicsCompressor();
    comp.threshold.value=-8; comp.ratio.value=6; comp.attack.value=0.001; comp.release.value=0.1;
    master.connect(comp); comp.connect(ctx.destination);

    noise.connect(hp); hp.connect(gNoise); gNoise.connect(master);
    osc.connect(gOsc); gOsc.connect(master);
    osc2.connect(gOsc2); gOsc2.connect(master);

    noise.start(t); noise.stop(t+0.06);
    osc.start(t); osc.stop(t+0.1);
    osc2.start(t); osc2.stop(t+0.07);
  }catch(e){}
}

function playWhistle(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();

    // === 最終輸出鏈：compressor → limiter → destination ===
    const limiter=ctx.createDynamicsCompressor();
    limiter.threshold.value=-1; limiter.knee.value=0;
    limiter.ratio.value=20; limiter.attack.value=0.0001; limiter.release.value=0.05;
    limiter.connect(ctx.destination);

    const comp=ctx.createDynamicsCompressor();
    comp.threshold.value=-10; comp.knee.value=4;
    comp.ratio.value=8; comp.attack.value=0.001; comp.release.value=0.08;
    comp.connect(limiter);

    const master=ctx.createGain();
    master.gain.value=4.05;
    master.connect(comp);

    const t=ctx.currentTime;
    const dur=0.92;

    // === pea flutter LFO：模擬豆子滾動顫音 ===
    const lfo=ctx.createOscillator();
    const lfoG=ctx.createGain();
    lfo.type='sine';
    lfo.frequency.value=32;          // 32Hz = 裁判哨典型flutter速率
    lfoG.gain.value=130;             // 頻率偏移深度
    lfo.connect(lfoG);

    // === 基頻振盪器 (3000 Hz) ===
    const osc1=ctx.createOscillator();
    osc1.type='sine';
    osc1.frequency.setValueAtTime(2950,t);
    osc1.frequency.linearRampToValueAtTime(3050,t+0.05);
    osc1.frequency.setValueAtTime(3050,t+0.05);
    osc1.frequency.linearRampToValueAtTime(2980,t+dur*0.88);
    lfoG.connect(osc1.frequency);

    // === 2次諧波 (6000 Hz) ===
    const osc2=ctx.createOscillator();
    osc2.type='sine';
    osc2.frequency.setValueAtTime(5900,t);
    osc2.frequency.linearRampToValueAtTime(6100,t+0.05);
    osc2.frequency.linearRampToValueAtTime(5960,t+dur*0.88);
    lfoG.connect(osc2.frequency);

    // === 3次諧波 (9000 Hz) 讓聲音更刺耳 ===
    const osc3=ctx.createOscillator();
    osc3.type='sine';
    osc3.frequency.setValueAtTime(8850,t);
    osc3.frequency.linearRampToValueAtTime(9150,t+0.05);
    osc3.frequency.linearRampToValueAtTime(8940,t+dur*0.88);
    lfoG.connect(osc3.frequency);

    // === 波形失真：讓聲音更飽滿尖銳 ===
    const distortion=ctx.createWaveShaper();
    const dCurve=new Float32Array(1024);
    for(let i=0;i<1024;i++){
      const x=i*2/1024-1;
      // soft clip with extra punch
      dCurve[i]=(3+60)*x*20*(Math.PI/180)/(Math.PI+60*Math.abs(x));
    }
    distortion.curve=dCurve;
    distortion.oversample='4x';

    // === gain envelope：快速起音，長持音，尾端短衰 ===
    const env=ctx.createGain();
    env.gain.setValueAtTime(0,t);
    env.gain.linearRampToValueAtTime(1.0,t+0.007);   // 極快 attack
    env.gain.setValueAtTime(1.0,t+dur*0.84);
    env.gain.linearRampToValueAtTime(0.001,t+dur);

    const g2=ctx.createGain(); g2.gain.value=0.45;  // 2次諧波音量
    const g3=ctx.createGain(); g3.gain.value=0.22;  // 3次諧波音量

    osc1.connect(distortion);
    distortion.connect(env);
    env.connect(master);

    osc2.connect(g2); g2.connect(env);
    osc3.connect(g3); g3.connect(env);

    osc1.start(t); osc2.start(t); osc3.start(t); lfo.start(t);
    osc1.stop(t+dur+0.1); osc2.stop(t+dur+0.1); osc3.stop(t+dur+0.1); lfo.stop(t+dur+0.1);
  }catch(e){}
}

function playEndSound(mode){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    if(mode==='beginner'){[523,659,784,1047].forEach((f,i)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=f;o.type='sine';const t=ctx.currentTime+i*0.13;g.gain.setValueAtTime(0.3,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.45);o.start(t);o.stop(t+0.45);});}
    else if(mode==='intermediate'){[[523,659,784],[587,740,880],[659,831,988],[784,988,1175]].forEach((ch,ci)=>{ch.forEach(f=>{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=f;o.type='triangle';const t=ctx.currentTime+ci*0.18;g.gain.setValueAtTime(0.15,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.55);o.start(t);o.stop(t+0.55);});});}
    else{[523,659,784,1047,988,1175,1319].forEach((f,i)=>{['sawtooth','square'].forEach((type,ti)=>{const o=ctx.createOscillator(),g=ctx.createGain(),flt=ctx.createBiquadFilter();flt.type='lowpass';flt.frequency.value=2200;o.connect(flt);flt.connect(g);g.connect(ctx.destination);o.frequency.value=f*(ti===1?0.5:1);o.type=type;const t=ctx.currentTime+i*0.1;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(ti===0?0.12:0.06,t+0.02);g.gain.exponentialRampToValueAtTime(0.001,t+0.55);o.start(t);o.stop(t+0.55);});});const buf=ctx.createBuffer(1,ctx.sampleRate*0.3,ctx.sampleRate);const d=buf.getChannelData(0);for(let j=0;j<d.length;j++)d[j]=(Math.random()*2-1)*Math.pow(1-j/d.length,5);const src=ctx.createBufferSource();src.buffer=buf;const g2=ctx.createGain();g2.gain.setValueAtTime(0.55,ctx.currentTime);src.connect(g2);g2.connect(ctx.destination);src.start(ctx.currentTime);}
  }catch(e){}
}
</script>
